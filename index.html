<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diametric — Purchase Task Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F5F7FA;
    --surface: #FFFFFF;
    --surface-2: #EEF2F7;
    --card: #FFFFFF;
    --card-hover: #FBFCFE;
    --border: #E2E7EF;
    --text: #1F2733;
    --text-soft: #5B6472;
    --text-faint: #94A0B2;
    --line: #2D6CDF;
    --line-bg: #EAF1FE;
    --amber: #B5750C;
    --amber-bg: #FCF2DF;
    --red: #D6493F;
    --red-bg: #FCEBEA;
    --green: #12A594;
    --green-bg: #E3F8F5;
    --shadow-sm: 0 1px 2px rgba(16,24,40,.05);
    --shadow-md: 0 10px 26px rgba(16,24,40,.10);
    --radius: 12px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);}
  ::selection{background:var(--line);color:#fff;}

  /* ---------- Title bar ---------- */
  .titlebar{
    background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm);
    padding:16px clamp(14px,3vw,32px);display:flex;justify-content:space-between;
    align-items:center;flex-wrap:wrap;gap:14px;position:relative;z-index:2;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:38px;height:38px;border:none;border-radius:11px;background:linear-gradient(135deg,var(--line),#6EA0F5);
    display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);
    font-weight:700;font-size:12px;color:#fff;flex:none;box-shadow:0 4px 10px rgba(45,108,223,.28);
  }
  .brand-text h1{font-family:var(--font-display);font-size:18px;margin:0;font-weight:600;color:var(--text);}
  .brand-text p{margin:2px 0 0;font-size:11px;color:var(--text-faint);font-family:var(--font-mono);letter-spacing:.4px;}
  .synced{font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);display:flex;align-items:center;gap:10px;}
  .refresh-btn{
    font-family:var(--font-mono);font-size:11.5px;padding:8px 14px;border-radius:999px;border:1px solid var(--border);
    background:var(--surface-2);cursor:pointer;color:var(--text);display:flex;align-items:center;gap:6px;
    transition:.15s;
  }
  .refresh-btn:hover{border-color:var(--line);color:var(--line);background:var(--line-bg);}
  .refresh-btn.spinning svg{animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- Sheet tabs ---------- */
  .tabs{
    display:flex;gap:10px;padding:16px clamp(14px,3vw,32px);background:var(--bg);
    overflow-x:auto;
  }
  .tab-box{
    display:flex;align-items:center;gap:10px;padding:10px 16px 10px 12px;border-radius:999px;
    background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-sm);
    cursor:pointer;white-space:nowrap;transition:.15s;flex:none;
  }
  .tab-box:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
  .tab-box.active{background:var(--line-bg);border-color:var(--line);}
  .tab-icon{
    width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:10px;font-weight:700;color:#fff;flex:none;
    background:var(--tab-color, var(--text-faint));
  }
  .tab-box .name{font-family:var(--font-display);font-size:13.5px;font-weight:600;color:var(--text);line-height:1.25;}
  .tab-box .count{font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);margin-top:1px;}
  .tab-box.active .count{color:var(--line);}

  .stats-strip{display:flex;gap:10px;padding:0 clamp(14px,3vw,32px) 16px;flex-wrap:wrap;}
  .stat-card{
    flex:1 1 130px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:12px 16px;box-shadow:var(--shadow-sm);
  }
  .stat-card .stat-num{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--text);line-height:1;}
  .stat-card .stat-lbl{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-faint);margin-top:6px;}
  .stat-card.c-overdue .stat-num{color:var(--red);}
  .stat-card.c-done .stat-num{color:var(--green);}

  /* ---------- Filter bar ---------- */
  .filterbar{
    display:flex;gap:10px;flex-wrap:wrap;align-items:center;
    padding:14px clamp(14px,3vw,32px);background:var(--surface);border-bottom:1px solid var(--border);
  }
  .f-field{display:flex;flex-direction:column;gap:3px;}
  .f-field label{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint);font-family:var(--font-mono);}
  .f-field input, .f-field select{
    background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:8px;
    padding:7px 10px;font-family:var(--font-body);font-size:12.5px;outline:none;min-width:120px;
  }
  .f-field input:focus, .f-field select:focus, .search-box:focus-within{border-color:var(--line);}
  .search-box{
    flex:1 1 200px;display:flex;align-items:center;gap:8px;background:var(--surface-2);
    border:1px solid var(--border);border-radius:8px;padding:8px 12px;align-self:flex-end;
  }
  .search-box input{border:none;outline:none;flex:1;font-family:var(--font-body);font-size:12.5px;background:transparent;color:var(--text);}
  .search-box input::placeholder{color:var(--text-faint);}
  .reset-btn{
    align-self:flex-end;font-family:var(--font-mono);font-size:11.5px;padding:8px 14px;border-radius:8px;
    border:1px solid var(--border);background:var(--surface-2);color:var(--text-soft);cursor:pointer;
  }
  .reset-btn:hover{color:var(--line);border-color:var(--line);}

  /* ---------- Board ---------- */
  .board-wrap{padding:18px clamp(14px,3vw,32px) 50px;overflow-x:auto;}
  .board{display:flex;gap:16px;min-width:max-content;align-items:flex-start;}
  .column{width:320px;flex:none;}
  .col-head{
    display:flex;justify-content:space-between;align-items:center;padding:0 4px 10px;
    border-bottom:2px solid var(--col-color, var(--border));margin-bottom:12px;
  }
  .col-head h3{font-size:12.5px;font-family:var(--font-mono);letter-spacing:.6px;text-transform:uppercase;margin:0;color:var(--text-soft);}
  .col-head .count{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);background:var(--surface-2);padding:2px 8px;border-radius:999px;}
  .col-body{display:flex;flex-direction:column;gap:10px;min-height:40px;}
  .col-empty{font-size:12px;color:var(--text-faint);text-align:center;padding:20px 0;border:1px dashed var(--border);border-radius:8px;}

  /* ---------- Card ---------- */
  .card{
    background:var(--card);border:1px solid var(--border);border-left:4px solid var(--border);
    border-radius:var(--radius);box-shadow:var(--shadow-sm);
    padding:15px 16px;display:flex;flex-direction:column;gap:11px;transition:.15s;cursor:pointer;
  }
  .card:hover{background:var(--card-hover);border-color:var(--line);border-left-color:var(--line);box-shadow:var(--shadow-md);transform:translateY(-2px);}
  .card.card-todo{border-left-color:#C7CCD6;}
  .card.card-overdue{border-left-color:var(--red);}
  .card.card-done{border-left-color:var(--green);}

  .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .card-person{display:flex;align-items:center;gap:10px;min-width:0;}
  .avatar-lg{
    width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:13px;font-weight:700;color:#fff;flex:none;
    box-shadow:0 2px 6px rgba(16,24,40,.15);
  }
  .card-person-name{font-family:var(--font-display);font-size:14.5px;font-weight:600;color:var(--text);line-height:1.3;}
  .card-person-sub{font-size:11px;color:var(--text-faint);font-family:var(--font-mono);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  .step-line{font-size:12px;color:var(--text-soft);}
  .step-line b{font-family:var(--font-mono);color:var(--line);margin-right:6px;}

  .pill-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
  .field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px 14px;}
  .field .k{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-faint);margin-bottom:2px;}
  .field .v{font-size:12.5px;color:var(--text);font-family:var(--font-mono);word-break:break-word;}
  .avatar{
    width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:9.5px;font-weight:700;color:#fff;flex:none;
  }
  .pill{
    font-family:var(--font-mono);font-size:10.5px;padding:4px 10px;border-radius:999px;font-weight:600;
    letter-spacing:.2px;white-space:nowrap;flex:none;
  }
  .pill.site{background:var(--surface-2);color:var(--text-soft);border:1px solid var(--border);}
  .pill.step{background:var(--amber-bg);color:var(--amber);}
  .pill.date{background:var(--surface-2);color:var(--text-faint);border:1px solid var(--border);font-family:var(--font-mono);}
  .pill.overdue{background:var(--red-bg);color:var(--red);}
  .pill.done{background:var(--green-bg);color:var(--green);}

  .link-row{display:flex;gap:6px;flex-wrap:wrap;}
  .link-pill{
    font-family:var(--font-mono);font-size:10.5px;padding:5px 10px;border-radius:7px;
    background:var(--line-bg);color:var(--line);text-decoration:none;border:1px solid var(--line-bg);
    transition:.15s;
  }
  .link-pill:hover{background:var(--line);color:#fff;border-color:var(--line);}

  .card-actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;}
  .btn{
    font-family:var(--font-body);font-size:12px;padding:8px 15px;border-radius:999px;cursor:pointer;font-weight:600;
    border:1px solid var(--border);background:transparent;color:var(--text-soft);
    display:inline-flex;align-items:center;gap:6px;transition:.15s;
  }
  .btn svg{flex:none;}
  .btn.complete{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 3px 8px rgba(18,165,148,.30);}
  .btn.complete:hover{background:#0e8c7e;}
  .btn.action{background:var(--line);border-color:var(--line);color:#fff;box-shadow:0 3px 8px rgba(45,108,223,.30);}
  .btn.action:hover{background:#2158b8;}
  .btn.reopen:hover{color:var(--line);border-color:var(--line);background:var(--line-bg);}
  .btn.whatsapp{background:#25D366;border-color:#25D366;color:#fff;box-shadow:0 3px 8px rgba(37,211,102,.30);}
  .btn.whatsapp:hover{background:#1EBE59;}
  .btn:disabled{opacity:.55;cursor:default;}

  .empty, .err, .loading{max-width:1180px;margin:40px auto;padding:0 clamp(14px,3vw,32px);text-align:center;color:var(--text-soft);}
  .empty h3, .err h3{font-family:var(--font-display);color:var(--text);margin-bottom:6px;}
  .err{color:var(--red);}
  .err code{background:var(--surface-2);padding:2px 6px;border-radius:4px;font-family:var(--font-mono);font-size:11.5px;border:1px solid var(--border);}
  .skeleton{background:linear-gradient(90deg,#EBEDF1 25%,#F6F7F9 37%,#EBEDF1 63%);background-size:400% 100%;animation:sk 1.4s ease infinite;border-radius:var(--radius);height:96px;margin-bottom:12px;}
  @keyframes sk{0%{background-position:100% 50%}100%{background-position:0 50%}}

  /* ---------- Detail modal ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(20,26,43,.45);backdrop-filter:blur(2px);
    display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;
  }
  .modal-panel{
    width:100%;max-width:560px;max-height:86vh;overflow-y:auto;background:var(--surface);
    border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 24px 64px rgba(16,24,40,.22);
  }
  .modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:4px;}
  .modal-head h2{font-family:var(--font-display);font-size:19px;margin:0;color:var(--text);}
  .modal-sub{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);margin-top:4px;}
  .modal-close{
    background:var(--surface-2);border:1px solid var(--border);color:var(--text-soft);
    width:30px;height:30px;border-radius:8px;cursor:pointer;flex:none;font-size:15px;line-height:1;
  }
  .modal-close:hover{color:var(--text);border-color:var(--line);}
  .modal-status-row{margin:14px 0;}
  .modal-section{margin-top:18px;}
  .modal-section h4{font-family:var(--font-mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint);margin:0 0 10px;}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px;}
  .modal-field .k{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-faint);margin-bottom:3px;}
  .modal-field .v{font-size:13px;color:var(--text);font-family:var(--font-mono);word-break:break-word;}
  .modal-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;}
  .modal-actions{margin-top:20px;display:flex;justify-content:flex-end;gap:10px;}
  @media (max-width:520px){ .modal-grid{grid-template-columns:1fr;} }

  /* ---------- Manage Buttons settings panel ---------- */
  #settingsRows{max-height:48vh;overflow-y:auto;padding-right:4px;}
  .settings-row{display:flex;flex-direction:column;gap:7px;padding:14px 0;border-bottom:1px solid var(--border);}
  .settings-row:last-child{border-bottom:none;}
  .settings-row-name{font-family:var(--font-display);font-weight:600;font-size:13.5px;color:var(--text);}
  .settings-row input{
    background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
    padding:8px 11px;font-family:var(--font-body);font-size:12.5px;outline:none;color:var(--text);width:100%;
  }
  .settings-row input:focus{border-color:var(--line);}
  .settings-hint{font-size:11px;color:var(--text-faint);margin-top:2px;}
  .tracker-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
  .tracker-row:last-child{border-bottom:none;}
  .tracker-name{font-family:var(--font-display);font-weight:600;font-size:13.5px;color:var(--text);}
  .tracker-counts{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
  .tracker-badge{font-family:var(--font-mono);font-size:10.5px;padding:3px 9px;border-radius:999px;font-weight:600;}
  .tracker-badge.pending{background:var(--surface-2);color:var(--text-soft);border:1px solid var(--border);}
  .tracker-badge.overdue{background:var(--red-bg);color:var(--red);}
  .tracker-badge.none{background:var(--green-bg);color:var(--green);}
  .aging-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
  .aging-row:last-child{border-bottom:none;}
  .aging-row-name{font-family:var(--font-display);font-weight:600;font-size:13.5px;color:var(--text);}
  .aging-row-sub{font-size:11px;color:var(--text-faint);font-family:var(--font-mono);margin-top:2px;}
  .aging-badge{font-family:var(--font-mono);font-size:11px;padding:4px 11px;border-radius:999px;font-weight:700;white-space:nowrap;flex:none;}
  .aging-badge.overdue{background:var(--red-bg);color:var(--red);}
  .aging-badge.upcoming{background:var(--surface-2);color:var(--text-soft);border:1px solid var(--border);}

  @media (max-width:640px){
    .filterbar{flex-direction:column;align-items:stretch;}
    .f-field, .search-box, .reset-btn{width:100%;min-width:0;}
  }

  /* ---------- Access gate ---------- */
  body.pre-access .app-shell{display:none;}
  .access-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;z-index:300;}
  .access-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:30px 28px;box-shadow:var(--shadow-md);}
  .access-brand{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
  .access-card h2{font-family:var(--font-display);font-size:18px;margin:0;color:var(--text);}
  .access-card p.sub{font-size:11.5px;color:var(--text-faint);margin:2px 0 0;}
  .access-card label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-faint);font-family:var(--font-mono);display:block;margin-bottom:6px;}
  .access-card input{
    width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);
    background:var(--surface-2);font-family:var(--font-body);font-size:13px;margin-bottom:16px;
    outline:none;color:var(--text);
  }
  .access-card input:focus{border-color:var(--line);}
  .access-submit{
    width:100%;padding:11px;border-radius:999px;border:none;background:var(--line);color:#fff;
    font-weight:600;font-family:var(--font-body);cursor:pointer;font-size:13px;transition:.15s;
  }
  .access-submit:hover{background:#2158b8;}
  .access-submit:disabled{opacity:.6;cursor:default;}
  .access-error{color:var(--red);font-size:12px;margin-top:12px;min-height:14px;}
</style>
</head>
<body class="pre-access">

<div class="titlebar app-shell">
  <div class="brand">
    <div class="brand-mark">DB</div>
    <div class="brand-text">
      <h1>Purchase Task Board</h1>
      <p>DIAMETRIC BUILDS · LIVE FROM PURCHASE DASH SHEET</p>
    </div>
  </div>
  <div class="synced">
    <span id="syncedAt"></span>
    <button class="refresh-btn" id="settingsBtn" title="Rename or link a task's button">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Manage Buttons
    </button>
    <button class="refresh-btn" id="doerNumbersBtn" title="Add Doer WhatsApp numbers">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.68 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.32 1.85.55 2.81.68A2 2 0 0 1 22 16.92z"/></svg>
      Doer Numbers
    </button>
    <button class="refresh-btn" id="assignAccessBtn" title="Assign each Doer's email so they only see their own tasks">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z" opacity="0"/><path d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6z"/><polyline points="22 6 12 13 2 6"/></svg>
      Assign Access

// Normalizes Indian-style numbers: strips spaces/dashes, drops a leading 0,
// and adds the 91 country code to a bare 10-digit number. If the number

function normalizePhone(raw){
  let digits = String(raw || "").replace(/\D/g, "");
  if (!digits) return "";
  if (digits.length === 11 && digits.startsWith("0")) digits = digits.slice(1);
  if (digits.length === 10) digits = "91" + digits;

  "grand total": "Grand Total",

function prettyFieldValue(h, v){

function buildReminderMessage(row, headers){
  const doer = getField(row, "Doer") || "";
  const isOverdue = overdueRow(row) && rowStatus(row) !== "done";
  const taskName = getField(row, "Step") || "";
  const taskLink = getField(row, "Task");

  const textLines = [];
  (headers || Object.keys(row)).forEach(h => {
    const v = row[h];
    if (v === undefined || v === null || v === "") return;
    const key = h.trim().toLowerCase();
    if (skip.has(key)) return;
    if (isLinkValue(v)) return; // only the Task link is shown, handled separately below
    textLines.push(`• *${prettyFieldLabel(h)}:* ${prettyFieldValue(h, v)}`);

  let msg = `*DIAMETRIC BUILDS*\n_Task Reminder_\n\n`;
  msg += `Dear ${doer},\n`;
  msg += isOverdue

  return msg;
}

const AVATAR_COLORS = ["#2D6CDF","#12A594","#C0398C","#0E8FA6","#D6493F","#7A5AF8","#0B7A99","#B5750C"];

const COLUMNS = [

];

function $(sel, root=document){ return root.querySelector(sel); }
function $all(sel, root=document){ return Array.from(root.querySelectorAll(sel)); }

// Strips surrounding quote characters (straight or curly) and whitespace,
// so a sheet value like `"https://..."` (typed/pasted with quotes) is
// still recognized and opened as a clean link.
function stripQuotes(v){
  return typeof v === "string" ? v.trim().replace(/^[""'']+|[""'']+$/g, "").trim() : v;
}
function isLinkValue(v){
  return typeof v === "string" && /^https?:\/\//i.test(stripQuotes(v));
}
// Looks up a field by exact header name first, then falls back to a
// trim+case-insensitive match — protects against hidden whitespace in a
// sheet's header row silently breaking a lookup like row["Doer"].
function getField(row, name){
  if (row[name] !== undefined && row[name] !== "") return row[name];
  const target = name.trim().toLowerCase();
  const key = Object.keys(row).find(k => k.trim().toLowerCase() === target);
  return key ? row[key] : undefined;
}
function overdueRow(row){
  const v = getField(row, "Deley");
  if (v === undefined || v === null || v === "") return false;
  if (typeof v === "number") return v > 0;
  const s = String(v).trim();
  if (!s || s.startsWith("-")) return false; // minus = time still remaining
  if (/^0+(:0+)*$/.test(s)) return false;     // exact zero = not overdue yet
  return true;                                 // positive = deadline has passed
}
// Parses a "Deley" value (e.g. "1148:35:30" or "-85:17:30", meaning
// H:MM:SS) into signed decimal hours. Positive = overdue by that much,
// negative = time still remaining. Falls back to treating it as a plain
// number if it isn't in H:MM:SS form.
function parseDelayHours(v){
  if (v === undefined || v === null || v === "") return null;
  if (typeof v === "number") return v;
  const s = String(v).trim();
  const m = s.match(/^(-?)(\d+):(\d{1,2}):(\d{1,2})$/);
  if (m) {
    const sign = m[1] === "-" ? -1 : 1;
    return sign * (Number(m[2]) + Number(m[3]) / 60 + Number(m[4]) / 3600);
  }
  const num = Number(s);
  return isNaN(num) ? null : num;
}
// Age in days: positive = overdue by that many days, negative = still
// due in that many days. Returns null if the row has no usable Deley value.
function computeAgeDays(row){
  const hrs = parseDelayHours(getField(row, "Deley"));
  return hrs === null ? null : hrs / 24;
}
function rowStatus(row){
  const s = (getField(row, "Status") || "").toString().trim().toLowerCase();
  return s.startsWith("completed") ? "done" : "pending";
}
function hashColor(str){
  let h = 0;
  for (let i = 0; i < (str||"").length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function initials(name){
  if (!name) return "?";
  const parts = name.trim().split(/\s+/);
  return (parts[0][0] + (parts[1] ? parts[1][0] : "")).toUpperCase();
}
// Parses "DD/MM/YYYY HH:MM:SS" style values from the sheet into a Date.
function parsePlanned(val){
  if (!val) return null;
  const m = String(val).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (!m) return null;
  return new Date(+m[3], +m[2]-1, +m[1]);
}

  }

  if (!CONFIG.API_URL || CONFIG.API_URL.includes("PASTE_YOUR")) {
    renderConfigError();
    btn.classList.remove("spinning");
    STATE.busy = false;
    return;
  }

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);
    const res = await fetch(`${CONFIG.API_URL}?action=list`, { method: "GET", signal: controller.signal });
    clearTimeout(timeout);

    let data;
    try {
      data = await res.json();
    } catch (parseErr) {
      throw new Error("Response wasn't JSON — check whether deployment access is set to 'Anyone'.");
    }
    if (data.error) throw new Error(data.error);

    STATE.sheets = data.sheets || [];
    if (!STATE.activeSheet && STATE.sheets.length) STATE.activeSheet = STATE.sheets[0].sheet;

    if (CURRENT_ACCESS && CURRENT_ACCESS.role !== "admin") {
      const doers = collectAllDoers();
      const matched = doers.find(d => d.trim().toLowerCase() === String(CURRENT_ACCESS.doer || "").trim().toLowerCase());
      STATE.assignee = matched || CURRENT_ACCESS.doer || "all";
    }

    renderTabs();
    populateFilterOptions();
    renderBoard();
    $("#syncedAt").textContent = "Last synced " + new Date().toLocaleTimeString("en-IN", {hour:'2-digit',minute:'2-digit'});
  } catch (err) {
    const msg = err.name === "AbortError" ? "Request did not respond within 30 seconds (timeout)." : err.message;
    renderFetchError(msg);
  } finally {
    btn.classList.remove("spinning");
    STATE.busy = false;
  }
}

  $("#boardWrap").innerHTML = `
    <div class="err">
      <h3>API URL not set</h3>
      <p>Paste your deployed Apps Script Web App URL into <code>CONFIG.API_URL</code> at the top of index.html.</p>
    </div>`;
  $("#tabs").innerHTML = "";
}

           style="display:inline-block;font-family:var(--font-mono);font-size:12.5px;padding:9px 18px;
                  border-radius:999px;background:var(--line);color:#fff;text-decoration:none;font-weight:600;">
          Test API URL directly ↗
        </a>
      </p>

function tabInitials(name){
  const parts = name.replace(/[_\-]/g, " ").trim().split(/\s+/);
  let initials = parts.slice(0, 2).map(p => p[0]).join("").toUpperCase();
  if (initials.length < 2 && name.length > 1) initials = name.slice(0, 2).toUpperCase();
  return initials;
}

function renderTabs(){
  const tabsEl = $("#tabs");
  tabsEl.innerHTML = "";
  STATE.sheets.forEach(s => {
    const box = document.createElement("div");
    box.className = "tab-box" + (s.sheet === STATE.activeSheet ? " active" : "");
    box.style.setProperty("--tab-color", hashColor(s.sheet));
    box.innerHTML = `
      <span class="tab-icon">${escapeHtml(tabInitials(s.sheet))}</span>
      <div>
        <div class="name">${escapeHtml(s.sheet)}</div>
        <div class="count">${s.rows.length} task${s.rows.length === 1 ? "" : "s"}</div>
      </div>`;
    box.onclick = () => {
      STATE.activeSheet = s.sheet;
      STATE.assignee = "all"; STATE.site = "all"; STATE.query = "";
      $("#searchInput").value = ""; $("#fStart").value = ""; $("#fEnd").value = "";
      STATE.dateStart = ""; STATE.dateEnd = "";
      renderTabs(); populateFilterOptions(); renderBoard();
    };
    tabsEl.appendChild(box);
  });
}

function currentSheetObj(){
  return STATE.sheets.find(s => s.sheet === STATE.activeSheet);
}

function populateFilterOptions(){
  const s = currentSheetObj();
  if (!s) return;
  const doers = [...new Set(s.rows.map(r => getField(r, "Doer")).filter(Boolean))].sort();
  const sites = [...new Set(s.rows.map(r => getField(r, "Site Code")).filter(Boolean))].sort();

  const aSel = $("#fAssignee");
  aSel.innerHTML = `<option value="all">All Assignees</option>` + doers.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join("");
  aSel.value = STATE.assignee;

  const sSel = $("#fSite");
  sSel.innerHTML = `<option value="all">All Sites</option>` + sites.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join("");
  sSel.value = STATE.site;
}

function passesFilters(row){
  if (STATE.query) {
    const q = STATE.query.toLowerCase();
    const hit = Object.values(row).some(v => (v||"").toString().toLowerCase().includes(q));
    if (!hit) return false;
  }
  if (STATE.assignee !== "all") {
    const doer = getField(row, "Doer");
    if (!doer || String(doer).trim().toLowerCase() !== String(STATE.assignee).trim().toLowerCase()) return false;
  }
  if (STATE.site !== "all" && getField(row, "Site Code") !== STATE.site) return false;
  if (STATE.dateStart || STATE.dateEnd) {
    const d = parsePlanned(getField(row, "Planned"));
    if (!d) return false;
    if (STATE.dateStart && d < new Date(STATE.dateStart)) return false;
    if (STATE.dateEnd && d > new Date(STATE.dateEnd + "T23:59:59")) return false;
  }
  return true;
}

function renderStats(rows){
  const strip = $("#statsStrip");
  const todo = rows.filter(COLUMNS[0].match).length;
  const overdue = rows.filter(COLUMNS[1].match).length;
  const done = rows.filter(COLUMNS[2].match).length;
  strip.innerHTML = `
    <div class="stat-card"><div class="stat-num">${rows.length}</div><div class="stat-lbl">Total Tasks</div></div>
    <div class="stat-card"><div class="stat-num">${todo}</div><div class="stat-lbl">To Do</div></div>
    <div class="stat-card c-overdue"><div class="stat-num">${overdue}</div><div class="stat-lbl">Overdue</div></div>
    <div class="stat-card c-done"><div class="stat-num">${done}</div><div class="stat-lbl">Completed</div></div>`;
}

function renderBoard(){
  const wrap = $("#boardWrap");
  const s = currentSheetObj();
  if (!s) { wrap.innerHTML = `<div class="empty"><h3>No sheet found</h3></div>`; return; }

  const rows = s.rows.filter(passesFilters);
  renderStats(rows);

  const board = document.createElement("div");
  board.className = "board";

  COLUMNS.forEach(col => {
    const colRows = rows.filter(col.match);
    const colEl = document.createElement("div");
    colEl.className = "column";
    colEl.style.setProperty("--col-color", col.color);
    colEl.innerHTML = `<div class="col-head"><h3>${col.label}</h3><span class="count">${colRows.length}</span></div>`;
    const body = document.createElement("div");
    body.className = "col-body";
    if (!colRows.length) {
      body.innerHTML = `<div class="col-empty">No tasks</div>`;
    } else {
      colRows.forEach(row => body.appendChild(renderCard(row, s.headers, s.sheet, col.key)));
    }
    colEl.appendChild(body);
    board.appendChild(colEl);
  });

  wrap.innerHTML = "";
  wrap.appendChild(board);
}

function pickSubtitle(row, headers){
  const found = [];
  for (const h of ["Work Order","MR","Vendor Name","Vendor","ID"]) {
    const v = getField(row, h);
    if (v && !found.includes(v)) found.push(v);
    if (found.length === 2) break;
  }
  return found.length ? found.join(" · ") : null;
}

function renderCard(row, headers, sheetName, colKey){
  const status = rowStatus(row);
  const overdue = overdueRow(row) && status !== "done";
  const doer = getField(row, "Doer");
  const stepCode = getField(row, "Step Code") || getField(row, "Step Id");
  const step = getField(row, "Step");
  const planned = getField(row, "Planned");
  const site = getField(row, "Site Code");
  const subtitle = pickSubtitle(row, headers);

  const card = document.createElement("div");
  card.className = "card card-" + colKey;

  // Header: the assignee is the card's primary identity — avatar + name up
  // top, with the record's own reference (Vendor/Bill/MR/ID) as a small
  // subtitle underneath, not the headline.
  const head = document.createElement("div");
  head.className = "card-head";
  const person = document.createElement("div");
  person.className = "card-person";
  if (doer) {
    person.innerHTML = `
      <span class="avatar-lg" style="background:${hashColor(doer)}">${initials(doer)}</span>
      <div>
        <div class="card-person-name">${escapeHtml(doer)}</div>
        ${subtitle ? `<div class="card-person-sub">${escapeHtml(subtitle)}</div>` : ""}
      </div>`;
  } else {
    person.innerHTML = `<div class="card-person-name">${escapeHtml(subtitle || "Task")}</div>`;
  }
  head.appendChild(person);
  if (overdue) {
    head.insertAdjacentHTML("beforeend", `<span class="pill overdue">Overdue</span>`);
  } else if (status === "done") {
    head.insertAdjacentHTML("beforeend", `<span class="pill done">Done</span>`);
  }
  card.appendChild(head);

  if (step) {
    const stepEl = document.createElement("div");
    stepEl.className = "step-line";
    stepEl.innerHTML = `<b>${escapeHtml(stepCode || "")}</b>${escapeHtml(step)}`;
    card.appendChild(stepEl);
  }

  const row2 = document.createElement("div");
  row2.className = "pill-row";
  if (stepCode) {
    const sp = document.createElement("span");
    sp.className = "pill step";
    sp.textContent = stepCode;
    row2.appendChild(sp);
  }
  if (planned) {
    const dt = document.createElement("span");
    dt.className = "pill date";
    dt.textContent = planned;
    row2.appendChild(dt);
  }
  if (site) {
    const sc = document.createElement("span");
    sc.className = "pill site";
    sc.textContent = site;
    row2.appendChild(sc);
  }
  if (row2.children.length) card.appendChild(row2);

  // Extra fields — driven entirely by THIS sheet's own headers, so each tab
  // naturally shows its own distinguishing columns (Vendor/Amt on Purchase
  // Bill, Grand Total/WorkOrder on Workorder, Type on FMS, etc.) without any
  // per-sheet hardcoding.
  const CARD_ALREADY_SHOWN = new Set(["Doer","Step Code","Step Id","Step","Planned","Site Code","Deley","Status","Work Order","MR","Vendor Name","Vendor","ID"]);
  const extraHeaders = headers.filter(h =>
    !CARD_ALREADY_SHOWN.has(h) && !HIDE_HEADERS.has(h) &&
    !LINK_HEADER_HINT.test(h) && !isLinkValue(row[h]) &&
    row[h] !== undefined && row[h] !== ""
  ).slice(0, 3);
  if (extraHeaders.length) {
    const grid = document.createElement("div");
    grid.className = "field-grid";
    extraHeaders.forEach(h => {
      const f = document.createElement("div");
      f.className = "field";
      f.innerHTML = `<div class="k">${escapeHtml(h)}</div><div class="v">${escapeHtml(row[h])}</div>`;
      grid.appendChild(f);
    });
    card.appendChild(grid);
  }

  const linkRow = document.createElement("div");
  linkRow.className = "link-row";
  headers.forEach(h => {
    if (h === "Status") return;
    const rawUrl = row[h];
    if (!rawUrl || !isLinkValue(rawUrl)) return;
    const url = stripQuotes(rawUrl);
    const a = document.createElement("a");
    a.href = url; a.target = "_blank"; a.rel = "noopener";
    a.className = "link-pill";
    const label = LINK_HEADER_HINT.test(h) ? (h.replace(/link/i,"").trim() || "Open") : h;
    a.innerHTML = `${escapeHtml(label)} ↗`;
    linkRow.appendChild(a);
  });
  if (linkRow.children.length) card.appendChild(linkRow);

  const isAdmin = !CURRENT_ACCESS || CURRENT_ACCESS.role === "admin";
  if (isAdmin) {
    const actions = document.createElement("div");
    actions.className = "card-actions";
    if (status === "done") {
      const reopenBtn = document.createElement("button");
      reopenBtn.className = "btn reopen";
      reopenBtn.textContent = "Reopen";
      reopenBtn.onclick = () => toggleStatus(row, sheetName, "markPending", reopenBtn);
      actions.appendChild(reopenBtn);
    } else {
      const waBtn = document.createElement("button");
      waBtn.className = "btn whatsapp";
      waBtn.innerHTML = `${WHATSAPP_ICON}<span>Remind</span>`;
      waBtn.onclick = (e) => { e.stopPropagation(); openWhatsAppReminder(row, headers); };
      actions.appendChild(waBtn);

      const doneBtn = document.createElement("button");
      const taskName = getField(row, "Step") || getField(row, "Task") || "";
      const action = findTaskAction(taskName);
      if (action) {
        doneBtn.className = "btn action";
        doneBtn.innerHTML = `${LINK_ICON}<span>${escapeHtml(action.label)}</span>`;
        doneBtn.onclick = (e) => { e.stopPropagation(); window.open(action.url, "_blank"); };
      } else {
        doneBtn.className = "btn complete";
        doneBtn.innerHTML = `${CHECK_ICON}<span>Mark Complete</span>`;
        doneBtn.onclick = () => toggleStatus(row, sheetName, "markComplete", doneBtn);
      }
      actions.appendChild(doneBtn);
    }
    card.appendChild(actions);
  }
  card.addEventListener("click", (e) => {
    if (e.target.closest(".link-pill") || e.target.closest(".btn")) return;
    openModal(row, headers, sheetName);
  });

  return card;
}

async function toggleStatus(row, sheetName, action, btnEl){
  btnEl.disabled = true;
  btnEl.textContent = "...";
  try {
    const doneBy = getField(row, "Doer") || "";
    await fetch(CONFIG.API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action, sheet: sheetName, row: row._row, doneBy }),
    });
    await loadData(false);
  } catch (err) {
    btnEl.disabled = false;
    alert("Update failed: " + err.message);
  }
}

function openModal(row, headers, sheetName){
  const status = rowStatus(row);
  const overdue = overdueRow(row) && status !== "done";
  const stepCode = getField(row, "Step Code") || getField(row, "Step Id");
  const step = getField(row, "Step");
  const doer = getField(row, "Doer");
  const subtitle = pickSubtitle(row, headers);
  const isAdminModal = !CURRENT_ACCESS || CURRENT_ACCESS.role === "admin";

  const linkFields = headers.filter(h => h !== "Status" && isLinkValue(row[h]));
  const textFields = headers.filter(h => h !== "Status" && !isLinkValue(row[h]) && row[h] !== undefined && row[h] !== "" && !HIDE_HEADERS.has(h));

  const root = $("#modalRoot");
  root.innerHTML = `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-panel">
        <div class="modal-head">
          <div>
            <h2>${escapeHtml(doer || subtitle || "Task")}</h2>
            <div class="modal-sub">${escapeHtml(sheetName)} · ROW ${row._row}${subtitle && doer ? " · " + escapeHtml(subtitle) : ""}</div>
          </div>
          <button class="modal-close" id="modalCloseBtn">✕</button>
        </div>

        <div class="modal-status-row pill-row">
          <span class="pill ${overdue ? "overdue" : (status === "done" ? "done" : "site")}">${overdue ? "Overdue" : (status === "done" ? "Completed" : "Pending")}</span>
          ${stepCode ? `<span class="pill step">${escapeHtml(stepCode)}</span>` : ""}
        </div>

        ${step ? `<div class="step-line" style="font-size:13px;">${escapeHtml(step)}</div>` : ""}

        <div class="modal-section">
          <h4>Details</h4>
          <div class="modal-grid">
            ${textFields.map(h => `
              <div class="modal-field">
                <div class="k">${escapeHtml(h)}</div>
                <div class="v">${escapeHtml(row[h])}</div>
              </div>`).join("")}
          </div>
        </div>

        ${linkFields.length ? `
        <div class="modal-section">
          <h4>Links</h4>
          <div class="modal-links">
            ${linkFields.map(h => {
              const label = LINK_HEADER_HINT.test(h) ? (h.replace(/link/i,"").trim() || "Open") : h;
              return `<a class="link-pill" href="${escapeHtml(stripQuotes(row[h]))}" target="_blank" rel="noopener">${escapeHtml(label)} ↗</a>`;
            }).join("")}
          </div>
        </div>` : ""}

        <div class="modal-actions">
          ${isAdminModal ? `
          ${status !== "done" ? `<button class="btn whatsapp" id="modalWaBtn">${WHATSAPP_ICON}<span>Remind on WhatsApp</span></button>` : ""}
          ${(() => {
            if (status === "done") return `<button class="btn reopen" id="modalActionBtn">Reopen</button>`;
            const action = findTaskAction(step);
            if (action) return `<button class="btn action" id="modalActionBtn">${LINK_ICON}<span>${escapeHtml(action.label)}</span></button>`;
            return `<button class="btn complete" id="modalActionBtn">${CHECK_ICON}<span>Mark Complete</span></button>`;
          })()}` : ""}
        </div>
      </div>
    </div>`;

  $("#modalOverlay").addEventListener("click", (e) => { if (e.target.id === "modalOverlay") closeModal(); });
  $("#modalCloseBtn").addEventListener("click", closeModal);
  document.addEventListener("keydown", escCloseModal);

  if (!isAdminModal) return;

  if ($("#modalWaBtn")) {
    $("#modalWaBtn").addEventListener("click", () => openWhatsAppReminder(row, headers));
  }

  $("#modalActionBtn").addEventListener("click", async (e) => {
    const btnEl = e.currentTarget;
    if (status !== "done") {
      const action = findTaskAction(step);
      if (action) { window.open(action.url, "_blank"); closeModal(); return; }
    }
    const nextAction = status === "done" ? "markPending" : "markComplete";
    btnEl.disabled = true; btnEl.textContent = "...";
    await toggleStatus(row, sheetName, nextAction, btnEl);
    closeModal();
  });
}

/* ------------------------------------------------------------
   BULK WHATSAPP REMINDER — combines every pending task a Doer has
   (in the currently open tab) into ONE WhatsApp message, so admin
   doesn't have to send a separate message per task.
   ------------------------------------------------------------ */
function buildBulkReminderMessage(doer, rows, sheetName){
  let msg = `*DIAMETRIC BUILDS*\n_Pending Tasks Reminder_\n\n`;
  msg += `Dear ${doer},\n`;
  msg += `You have ${rows.length} pending task${rows.length === 1 ? "" : "s"}`;
  if (sheetName) msg += ` on *${sheetName}*`;
  msg += `:\n\n`;

  rows.forEach((row, i) => {
    const task = getField(row, "Step") || "Task";
    const overdue = overdueRow(row);
    const bits = [];
    const site = getField(row, "Site Code");
    const amt = getField(row, "Amt");
    const client = getField(row, "Clint Name") || getField(row, "Client Name");
    if (site) bits.push(`Site: ${site}`);
    if (client) bits.push(`Client: ${client}`);
    if (amt !== undefined && amt !== "") bits.push(`Amount: ${prettyFieldValue("Amt", amt)}`);
    msg += `${i + 1}. *${task}*${overdue ? " ⚠️ Overdue" : ""}`;
    if (bits.length) msg += `\n   ${bits.join(" · ")}`;
    msg += `\n`;
  });

  msg += `\nPlease complete these at the earliest.\n– Diametric Builds`;
  return msg;
}
function openBulkWhatsAppReminder(doer, rows, sheetName){
  const phone = normalizePhone(getDoerPhone(doer));
  if (!phone) {
    alert(`"${doer}"'s WhatsApp number is not set in Doer Numbers. Please add it there first.`);
    openDoerDirectoryModal();
    return false;
  }
  const text = encodeURIComponent(buildBulkReminderMessage(doer, rows, sheetName));
  window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
  return true;
}

/* ------------------------------------------------------------
   PENDING TRACKER — doer-wise summary of pending/overdue tasks in
   the currently open tab, sorted with the most overdue people
   first, plus one-click bulk WhatsApp reminders.
   ------------------------------------------------------------ */
function buildDoerTrackerData(){
  const s = currentSheetObj();
  if (!s) return { sheetName: "", entries: [] };
  const byDoer = {};
  s.rows.forEach(row => {
    if (rowStatus(row) === "done") return;
    const doer = getField(row, "Doer") || "Unassigned";
    if (!byDoer[doer]) byDoer[doer] = [];
    byDoer[doer].push(row);
  });
  const entries = Object.keys(byDoer).map(doer => {
    const rows = byDoer[doer];
    const overdueCount = rows.filter(overdueRow).length;
    return { doer, rows, pendingCount: rows.length, overdueCount };
  }).sort((a, b) => b.overdueCount - a.overdueCount || b.pendingCount - a.pendingCount);
  return { sheetName: s.sheet, entries };
}

function openTrackerModal(){
  const { sheetName, entries } = buildDoerTrackerData();
  const root = $("#modalRoot");

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "trackerOverlay";
  const panel = document.createElement("div");
  panel.className = "modal-panel";
  panel.style.maxWidth = "560px";
  panel.innerHTML = `
    <div class="modal-head">
      <div>
        <h2>Pending Tracker</h2>
        <div class="modal-sub">${escapeHtml(sheetName)} · sorted by most overdue first</div>
      </div>
      <button class="modal-close" id="trackerCloseBtn">✕</button>
    </div>
    <div class="modal-actions" style="justify-content:flex-start;margin:14px 0 4px;">
      <button class="btn whatsapp" id="trackerRemindAllBtn">${WHATSAPP_ICON}<span>Remind All Overdue</span></button>
    </div>
    <div class="modal-section"><div id="trackerRows"></div></div>`;
  overlay.appendChild(panel);
  root.innerHTML = "";
  root.appendChild(overlay);

  const rowsWrap = $("#trackerRows", panel);
  if (!entries.length) {
    rowsWrap.innerHTML = `<p class="settings-hint">No pending tasks in this tab — all clear.</p>`;
  } else {
    entries.forEach(entry => {
      const row = document.createElement("div");
      row.className = "tracker-row";
      const badgesHtml = `
        <span class="tracker-badge pending">${entry.pendingCount} pending</span>
        ${entry.overdueCount ? `<span class="tracker-badge overdue">${entry.overdueCount} overdue</span>` : `<span class="tracker-badge none">on time</span>`}`;
      row.innerHTML = `
        <div>
          <div class="tracker-name">${escapeHtml(entry.doer)}</div>
          <div class="tracker-counts">${badgesHtml}</div>
        </div>`;
      const waBtn = document.createElement("button");
      waBtn.className = "btn whatsapp";
      waBtn.innerHTML = `${WHATSAPP_ICON}<span>Remind</span>`;
      waBtn.onclick = () => openBulkWhatsAppReminder(entry.doer, entry.rows, sheetName);
      row.appendChild(waBtn);
      rowsWrap.appendChild(row);
    });
  }

  overlay.addEventListener("click", (e) => { if (e.target.id === "trackerOverlay") closeModal(); });
  $("#trackerCloseBtn", panel).addEventListener("click", closeModal);
  document.addEventListener("keydown", escCloseModal);

  $("#trackerRemindAllBtn", panel).addEventListener("click", () => {
    const overdueEntries = entries.filter(e => e.overdueCount > 0);
    if (!overdueEntries.length) { alert("There are no overdue tasks right now."); return; }
    if (!confirm(`Send a WhatsApp reminder to ${overdueEntries.length} Doer(s)? A new tab will open for each — please allow browser popups.`)) return;
    overdueEntries.forEach((entry, i) => {
      setTimeout(() => openBulkWhatsAppReminder(entry.doer, entry.rows, sheetName), i * 400);
    });
  });
}

/* ------------------------------------------------------------
   AGING TRACKER — every pending task across EVERY tab, sorted so
   the task that's been overdue the longest is at the top. Helps a
   process coordinator see what's been stuck longest, regardless
   of which sheet or which Doer it belongs to.
   ------------------------------------------------------------ */
function buildAgingTrackerData(){
  const entries = [];
  STATE.sheets.forEach(s => {
    s.rows.forEach(row => {
      if (rowStatus(row) === "done") return;
      const ageDays = computeAgeDays(row);
      if (ageDays === null) return;
      entries.push({ row, sheet: s.sheet, headers: s.headers, ageDays });
    });
  });
  entries.sort((a, b) => b.ageDays - a.ageDays); // most overdue first
  return entries;
}

function openAgingTrackerModal(){
  const entries = buildAgingTrackerData();
  const root = $("#modalRoot");

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "agingOverlay";
  const panel = document.createElement("div");
  panel.className = "modal-panel";
  panel.style.maxWidth = "600px";
  panel.innerHTML = `
    <div class="modal-head">
      <div>
        <h2>Aging Tracker</h2>
        <div class="modal-sub">All tabs · oldest overdue task first</div>
      </div>
      <button class="modal-close" id="agingCloseBtn">✕</button>
    </div>
    <div class="modal-section"><div id="agingRows"></div></div>`;
  overlay.appendChild(panel);
  root.innerHTML = "";
  root.appendChild(overlay);

  const rowsWrap = $("#agingRows", panel);
  if (!entries.length) {
    rowsWrap.innerHTML = `<p class="settings-hint">No pending tasks found across any tab.</p>`;
  } else {
    entries.forEach(entry => {
      const { row, sheet, headers, ageDays } = entry;
      const doer = getField(row, "Doer") || "Unassigned";
      const task = getField(row, "Step") || "Task";
      const isOverdue = ageDays > 0;
      const badgeText = isOverdue
        ? `${ageDays.toFixed(1)}d overdue`
        : `due in ${Math.abs(ageDays).toFixed(1)}d`;

      const rowEl = document.createElement("div");
      rowEl.className = "aging-row";
      rowEl.innerHTML = `
        <div style="min-width:0;">
          <div class="aging-row-name">${escapeHtml(task)}</div>
          <div class="aging-row-sub">${escapeHtml(doer)} · ${escapeHtml(sheet)}</div>
        </div>
        <span class="aging-badge ${isOverdue ? "overdue" : "upcoming"}">${badgeText}</span>`;
      rowEl.style.cursor = "pointer";
      rowEl.addEventListener("click", () => { closeModal(); openModal(row, headers, sheet); });
      rowsWrap.appendChild(rowEl);
    });
  }

  overlay.addEventListener("click", (e) => { if (e.target.id === "agingOverlay") closeModal(); });
  $("#agingCloseBtn", panel).addEventListener("click", closeModal);
  document.addEventListener("keydown", escCloseModal);
}

function openEmailAlertsModal(){
  const root = $("#modalRoot");

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "emailAlertsOverlay";
  const panel = document.createElement("div");
  panel.className = "modal-panel";
  panel.style.maxWidth = "480px";
  panel.innerHTML = `
    <div class="modal-head">
      <div>
        <h2>Email Alerts</h2>
        <div class="modal-sub">Who receives the automatic daily pending/overdue summary email (sent every morning).</div>
      </div>
      <button class="modal-close" id="emailAlertsCloseBtn">✕</button>
    </div>
    <div class="modal-section">
      <label class="settings-hint" style="display:block;margin-bottom:6px;">Recipient emails (one per line)</label>
      <textarea id="digestEmailsInput" rows="5" placeholder="Loading current list..." style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);font-family:var(--font-mono);font-size:12.5px;resize:vertical;"></textarea>
    </div>
    <div class="access-error" id="emailAlertsError"></div>
    <div class="modal-actions">
      <button class="btn action" id="emailAlertsSaveBtn">${CHECK_ICON}<span>Save Recipients</span></button>
    </div>`;
  overlay.appendChild(panel);
  root.innerHTML = "";
  root.appendChild(overlay);

  overlay.addEventListener("click", (e) => { if (e.target.id === "emailAlertsOverlay") closeModal(); });
  $("#emailAlertsCloseBtn", panel).addEventListener("click", closeModal);
  document.addEventListener("keydown", escCloseModal);

  const textarea = $("#digestEmailsInput", panel);
  fetch(`${CONFIG.API_URL}?action=getDigestRecipients`)
    .then(res => res.json())
    .then(data => { textarea.value = (data.emails || []).join("\n"); textarea.placeholder = "name@example.com"; })
    .catch(() => { textarea.placeholder = "name@example.com"; });

  $("#emailAlertsSaveBtn", panel).addEventListener("click", async () => {
    const errEl = $("#emailAlertsError", panel);
    errEl.textContent = "";
    const emails = textarea.value.split("\n").map(e => e.trim()).filter(Boolean);

    const btn = $("#emailAlertsSaveBtn", panel);
    btn.disabled = true;
    btn.innerHTML = `<span>Saving...</span>`;
    try {
      const res = await fetch(CONFIG.API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "setDigestRecipients", emails }),
      });
      const data = await res.json();
      if (data.error) { errEl.textContent = data.error; }
      else { closeModal(); }
    } catch (err) {
      errEl.textContent = "Save failed: " + err.message;
    }
    btn.disabled = false;
    btn.innerHTML = `${CHECK_ICON}<span>Save Recipients</span>`;
  });
}

function openNewTabModal(){
  const root = $("#modalRoot");

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "newTabOverlay";
  const panel = document.createElement("div");
  panel.className = "modal-panel";
  panel.style.maxWidth = "480px";
  panel.innerHTML = `
    <div class="modal-head">
      <div>
        <h2>New Tab</h2>
        <div class="modal-sub">A new task tab will be created right here — no need to open the Google Sheet.</div>
      </div>
      <button class="modal-close" id="newTabCloseBtn">✕</button>
    </div>
    <div class="modal-section">
      <label class="settings-hint" style="display:block;margin-bottom:6px;">Tab Name</label>
      <input type="text" id="newTabName" placeholder="e.g. Site Visits" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);font-family:var(--font-body);font-size:13px;">
    </div>

      <label class="settings-hint" style="display:block;margin-bottom:6px;">
        Columns (comma-separated — leave blank to use the default set)
      </label>
      <input type="text" id="newTabHeaders" placeholder="Doer, Step, Planned, Deley, Site Code, Amt, Status" style="width:100%;padding:9px 12px;border-radius:8px;border:1px solid var(--border);font-family:var(--font-body);font-size:13px;">
    </div>
    <div class="access-error" id="newTabError"></div>

  overlay.appendChild(panel);
  root.innerHTML = "";
  root.appendChild(overlay);

  overlay.addEventListener("click", (e) => { if (e.target.id === "newTabOverlay") closeModal(); });
  $("#newTabCloseBtn", panel).addEventListener("click", closeModal);
  document.addEventListener("keydown", escCloseModal);
  $("#newTabName", panel).focus();

  $("#newTabCreateBtn", panel).addEventListener("click", async () => {
    const errEl = $("#newTabError", panel);
    errEl.textContent = "";
    const name = $("#newTabName", panel).value.trim();
    if (!name) { errEl.textContent = "Please enter a tab name."; return; }
    const headersRaw = $("#newTabHeaders", panel).value.trim();
    const headers = headersRaw ? headersRaw.split(",").map(h => h.trim()).filter(Boolean) : [];

    const btn = $("#newTabCreateBtn", panel);
    btn.disabled = true;
    btn.innerHTML = `<span>Creating...</span>`;
    try {
      const res = await fetch(CONFIG.API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "createTab", name, headers }),
      });
      const data = await res.json();
      if (data.error) { errEl.textContent = data.error; btn.disabled = false; btn.innerHTML = `${CHECK_ICON}<span>Create Tab</span>`; return; }
      closeModal();
      await loadData(false);
      STATE.activeSheet = name;
      renderTabs(); populateFilterOptions(); renderBoard();
    } catch (err) {
      errEl.textContent = "Create failed: " + err.message;
      btn.disabled = false;
      btn.innerHTML = `${CHECK_ICON}<span>Create Tab</span>`;
    }
  });
}

function escCloseModal(e){
  if (e.key === "Escape") closeModal();
}

function closeModal(){
  $("#modalRoot").innerHTML = "";
  document.removeEventListener("keydown", escCloseModal);
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
}

/* ============================================================
   ACCESS GATE — email-based, no backend needed
   ============================================================ */
const ACCESS_KEY = "diametric_current_access";
let CURRENT_ACCESS = null;

function getStoredAccess(){
  try { return JSON.parse(localStorage.getItem(ACCESS_KEY)); }
  catch (e) { return null; }
}
function saveStoredAccess(a){ localStorage.setItem(ACCESS_KEY, JSON.stringify(a)); }
function clearStoredAccess(){ localStorage.removeItem(ACCESS_KEY); }

function renderAccessGate(){
  const root = $("#accessRoot");
  root.innerHTML = `
    <div class="access-overlay">
      <div class="access-card">
        <div class="access-brand">
          <div class="brand-mark">DB</div>
          <div>
            <h2>Purchase Task Board</h2>
            <p class="sub">Diametric Builds — enter your email</p>
          </div>
        </div>
        <label>Email</label>
        <input type="email" id="accessEmail" autocomplete="email" placeholder="name@example.com">
        <button class="access-submit" id="accessSubmitBtn">Continue</button>
        <div class="access-error" id="accessError"></div>
      </div>
    </div>`;
  $("#accessSubmitBtn").addEventListener("click", attemptAccess);
  $("#accessEmail").addEventListener("keydown", (e) => { if (e.key === "Enter") attemptAccess(); });
  $("#accessEmail").focus();
}

function attemptAccess(){
  const email = $("#accessEmail").value.trim();
  const errEl = $("#accessError");
  errEl.textContent = "";
  if (!email) { errEl.textContent = "Please enter your email."; return; }

  const access = resolveAccess(email);
  if (!access) {
    errEl.textContent = "This email didn't match any task. Ask the admin to add your email (Assign Access panel).";
    return;
  }
  saveStoredAccess(access);
  startAppWithAccess(access);
}

function startAppWithAccess(access){
  CURRENT_ACCESS = access;
  $("#accessRoot").innerHTML = "";
  document.body.classList.remove("pre-access");
  applyAccessRestrictions(access);
  loadData(true);
  if (CONFIG.AUTO_REFRESH_MS > 0) {
    setInterval(() => loadData(false), CONFIG.AUTO_REFRESH_MS);
  }
}

function applyAccessRestrictions(access){
  const isAdmin = access.role === "admin";
  const settingsBtn = $("#settingsBtn");
  const doerBtn = $("#doerNumbersBtn");
  const assignBtn = $("#assignAccessBtn");
  const newTabBtn = $("#newTabBtn");
  const trackerBtn = $("#trackerBtn");
  const agingBtn = $("#agingBtn");
  const emailAlertsBtn = $("#emailAlertsBtn");
  if (settingsBtn) settingsBtn.style.display = isAdmin ? "" : "none";
  if (doerBtn) doerBtn.style.display = isAdmin ? "" : "none";
  if (assignBtn) assignBtn.style.display = isAdmin ? "" : "none";
  if (newTabBtn) newTabBtn.style.display = isAdmin ? "" : "none";
  if (trackerBtn) trackerBtn.style.display = isAdmin ? "" : "none";
  if (agingBtn) agingBtn.style.display = isAdmin ? "" : "none";
  if (emailAlertsBtn) emailAlertsBtn.style.display = isAdmin ? "" : "none";

  if (!isAdmin) {
    const assigneeField = $("#fAssignee").closest(".f-field");
    if (assigneeField) assigneeField.style.display = "none";
    STATE.assignee = access.doer || "all";
  }
  renderAccessBadge(access);
}

function renderAccessBadge(access){
  let badge = $("#accessBadge");
  if (!badge) {
    badge = document.createElement("div");
    badge.id = "accessBadge";
    badge.style.cssText = "display:flex;align-items:center;gap:8px;";
    $(".synced").prepend(badge);
  }
  badge.innerHTML = `
    <span style="font-family:var(--font-mono);font-size:10.5px;color:var(--text-faint);">
      ${escapeHtml(access.doer || access.email)}${access.role === "admin" ? " · admin" : ""}
    </span>
    <button class="refresh-btn" id="switchAccountBtn">Switch account</button>`;
  $("#switchAccountBtn").addEventListener("click", () => { clearStoredAccess(); location.reload(); });
}

function bootstrapAccess(){
  const stored = getStoredAccess();
  if (stored && resolveAccess(stored.email)) {
    startAppWithAccess(resolveAccess(stored.email));
  } else {
    if (stored) clearStoredAccess();
    renderAccessGate();
  }
}
bootstrapAccess();
</script>
